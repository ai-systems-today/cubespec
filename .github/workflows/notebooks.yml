name: Notebooks

on:
  push:
    branches: [main]
    paths:
      - "notebooks/**"
      - "src/cubespec/**"
      - "examples/**"
      - ".github/workflows/notebooks.yml"
  pull_request:
    branches: [main]

jobs:
  execute:
    name: nbmake all 16 notebooks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install with notebook deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[plot,cli,calibration,dev]" nbmake jupyter
      - name: Execute every notebook end-to-end
        env:
          CUBESPEC_FAST_CI: "1"
        run: |
          pytest --nbmake notebooks/ -v --nbmake-timeout=180
